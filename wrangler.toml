name = "tgchatbotd1"
main = "src/index.js"
compatibility_date = "2024-01-01"

# D1 数据库绑定
[[d1_databases]]
binding = "TG_BOT_DB"
database_name = "tg-bot-db"
database_id = "95fa01fc-0dcc-40bb-9d88-09d1ad2d336c"

# 环境变量（生产环境请在 Cloudflare Dashboard 中配置）
[vars]
# BOT_TOKEN = "your-bot-token"
# ADMIN_IDS = "your-admin-ids"
# ADMIN_GROUP_ID = "your-group-id"
# WORKER_URL = "https://your-worker.workers.dev"
# TURNSTILE_SITE_KEY = "your-turnstile-site-key"
# TURNSTILE_SECRET_KEY = "your-turnstile-secret-key"
# RECAPTCHA_SITE_KEY = "your-recaptcha-site-key"
# RECAPTCHA_SECRET_KEY = "your-recaptcha-secret-key"
# TELEGRAM_WEBHOOK_SECRET = "your-webhook-secret"

# Cron 触发器 - 每 6 小时执行一次 AI 记忆总结
[triggers]
crons = ["0 */6 * * *"]

# 日志收集和追踪配置
[observability]
enabled = true
head_sampling_rate = 0.1  # 10% 采样率，平衡调试需求和性能开销
